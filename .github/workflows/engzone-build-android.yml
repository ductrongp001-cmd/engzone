name: EngZone Build Android

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v2

      - name: Build web app
        working-directory: client
        run: |
          npm ci
          npm run build
          mkdir -p android/app/src/main/assets/public
          cp -r dist/* android/app/src/main/assets/public/
          echo '{"appId":"com.engzone.app","appName":"EngZone","webDir":"dist"}' > android/app/src/main/assets/capacitor.config.json
          echo '[]' > android/app/src/main/assets/capacitor.plugins.json

      - name: Build APK
        working-directory: client/android
        id: gradle
        run: |
          chmod +x gradlew
          set -o pipefail
          ./gradlew assembleDebug --no-daemon 2>&1 | tee /tmp/gradle.log

      - name: Post output
        if: always()
        run: |
          echo "### Build output" >> $GITHUB_STEP_SUMMARY
          URL=$(tail -100 /tmp/gradle.log | curl -s -F 'f:1=<-' ix.io 2>&1)
          echo "ix.io URL: $URL"
          echo "ix.io URL: $URL" >> $GITHUB_STEP_SUMMARY
          ls -la client/android/app/build/outputs/apk/debug/ 2>/dev/null && echo "APK FOUND" >> $GITHUB_STEP_SUMMARY || echo "No APK dir"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: engzone-android
          path: client/android/app/build/outputs/apk/debug/*.apk
