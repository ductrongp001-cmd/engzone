name: EngZone Build Android

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v2

      - name: Build
        working-directory: client
        run: |
          npm ci && npm run build
          mkdir -p android/app/src/main/assets/public
          cp -r dist/* android/app/src/main/assets/public/
          echo "sdk.dir=/usr/local/lib/android/sdk" > android/local.properties
          chmod +x android/gradlew
          cd android && set -o pipefail && ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle.log

      - name: Upload error
        if: failure()
        run: |
          tail -100 /tmp/gradle.log | curl -s -F 'f:1=<-' https://ix.io 2>&1 | tee /tmp/ixio.txt
          echo "::notice::Gradle error at $(cat /tmp/ixio.txt)"

      - uses: actions/upload-artifact@v4
        with:
          name: engzone-android
          path: client/android/app/build/outputs/apk/debug/*.apk
