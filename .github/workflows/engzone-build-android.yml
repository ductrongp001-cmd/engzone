name: EngZone Build Android

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v2

      - name: Build and Sync
        run: |
          npm ci
          npm run build
          ./node_modules/.bin/cap sync android

      - name: Build APK
        working-directory: client/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle.log; set -o pipefail; exit ${PIPESTATUS[0]}

      - name: Upload errors
        if: failure()
        run: |
          URL=$(tail -100 /tmp/gradle.log | curl -s --data-binary @- https://paste.rs)
          echo "::notice::Gradle error at $URL"

      - uses: actions/upload-artifact@v4
        with:
          name: engzone-android
          path: client/android/app/build/outputs/apk/debug/*.apk
