name: EngZone Build Android

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v2

      - name: Build
        working-directory: client
        run: |
          npm ci && npm run build
          mkdir -p android/app/src/main/assets/public
          cp -r dist/* android/app/src/main/assets/public/
          cd android && chmod +x gradlew && ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: engzone-android
          path: client/android/app/build/outputs/apk/debug/*.apk

      - name: Show APK info
        if: always()
        run: |
          ls -la client/android/app/build/outputs/apk/debug/ 2>/dev/null
          ls -la client/android/build-outputs.log 2>/dev/null
