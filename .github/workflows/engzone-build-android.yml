name: EngZone Build Android

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Build web app
        working-directory: client
        run: npm run build

      - name: Copy web assets to Android
        working-directory: client
        run: |
          mkdir -p android/app/src/main/assets/public
          cp -r dist/* android/app/src/main/assets/public/
          echo '{"appId":"com.engzone.app","appName":"EngZone","webDir":"dist"}' > android/app/src/main/assets/capacitor.config.json
          echo '[]' > android/app/src/main/assets/capacitor.plugins.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2

      - name: Build APK
        working-directory: client/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug > build-output.log 2>&1 || true

      - name: Check build result
        working-directory: client/android
        run: |
          tail -20 build-output.log
          if [ -f build-output.log ]; then
            echo "Build exit code was checked"
          fi
          echo "Checking for APK..."
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No APK found"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: engzone-build-log
          path: client/android/build-output.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: engzone-android
          path: client/android/app/build/outputs/apk/debug/*.apk
